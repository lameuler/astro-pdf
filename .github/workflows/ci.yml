name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '24.15'

jobs:
    lint:
        name: 'Lint'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup node@${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install Dependencies
              run: pnpm ci

            - name: Build types
              run: pnpm tsc

            - name: Generate astro types for docs
              run: pnpm -C docs astro sync

            - name: Lint
              run: |
                  pnpm run lint
                  pnpm run lint:docs

    format:
        name: 'Check format'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup node@${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install Dependencies
              run: pnpm ci

            - name: Check Format
              run: pnpm run format:check

    docs:
        name: 'Check docs build'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup node@${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Configure AppArmor profile for Puppeteer
              run: |
                  sudo tee /etc/apparmor.d/chrome-dev-builds <<EOF
                  abi <abi/4.0>,
                  include <tunables/global>

                  profile chrome $HOME/.cache/puppeteer/chrome/*/chrome-linux64/chrome flags=(unconfined) {
                    userns,

                    # Site-specific additions and overrides. See local/README for details.
                    include if exists <local/chrome>
                  }

                  profile chrome-local $PWD/test/fixtures/*/node_modules/.astro/chrome/*/chrome-linux64/chrome flags=(unconfined) {
                    userns,

                    # Site-specific additions and overrides. See local/README for details.
                    include if exists <local/chrome>
                  }
                  EOF
                  sudo apparmor_parser -r /etc/apparmor.d/chrome-dev-builds
                  sudo service apparmor reload

            - name: Install Dependencies
              run: pnpm ci

            - name: Build docs
              run: pnpm run -C docs build

    pack:
        name: 'Dry run pnpm pack'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup node@${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install Dependencies
              run: pnpm ci

            - name: Dry run pnpm pack
              run: pnpm pack --dry-run

    test:
        name: 'Test: ${{ matrix.os }} (node@${{ matrix.node-version }})'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                node-version: [22, '24.15', '26.0']
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Configure AppArmor profile for Puppeteer (Linux only)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo tee /etc/apparmor.d/chrome-dev-builds <<EOF
                  abi <abi/4.0>,
                  include <tunables/global>

                  profile chrome $HOME/.cache/puppeteer/chrome/*/chrome-linux64/chrome flags=(unconfined) {
                    userns,

                    # Site-specific additions and overrides. See local/README for details.
                    include if exists <local/chrome>
                  }

                  profile chrome-local $PWD/test/fixtures/*/node_modules/.astro/chrome/*/chrome-linux64/chrome flags=(unconfined) {
                    userns,

                    # Site-specific additions and overrides. See local/README for details.
                    include if exists <local/chrome>
                  }
                  EOF
                  sudo apparmor_parser -r /etc/apparmor.d/chrome-dev-builds
                  sudo service apparmor reload

            - name: Setup node@${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install Dependencies
              run: pnpm ci

            - name: Build Package
              run: pnpm run build

            - name: Run tests
              run: pnpm test

    release:
        name: Release
        needs: [pack, test]

        if: ${{ (github.repository_owner == 'lameuler') && (github.ref == 'refs/heads/main') }}
        runs-on: ubuntu-latest

        permissions:
            contents: write
            pull-requests: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Configure AppArmor profile for Puppeteer
              run: |
                  sudo tee /etc/apparmor.d/chrome-dev-builds <<EOF
                  abi <abi/4.0>,
                  include <tunables/global>

                  profile chrome $HOME/.cache/puppeteer/chrome/*/chrome-linux64/chrome flags=(unconfined) {
                    userns,

                    # Site-specific additions and overrides. See local/README for details.
                    include if exists <local/chrome>
                  }

                  profile chrome-local $PWD/test/fixtures/*/node_modules/.astro/chrome/*/chrome-linux64/chrome flags=(unconfined) {
                    userns,

                    # Site-specific additions and overrides. See local/README for details.
                    include if exists <local/chrome>
                  }
                  EOF
                  sudo apparmor_parser -r /etc/apparmor.d/chrome-dev-builds
                  sudo service apparmor reload

            - name: Install Dependencies
              run: pnpm ci

            - name: Create Release Pull Request or Publish
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm run version
                  publish: npx changeset publish
                  commit: 'chore: release'
                  title: '[changesets] release'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
